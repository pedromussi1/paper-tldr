# Default QLoRA training config for Llama 3.2 3B Instruct on SciTLDR.
# Override any field on the CLI via run_train.py --override key=value.

model_name: meta-llama/Llama-3.2-3B-Instruct
processed_dir: data/processed
output_dir: checkpoints/qlora-3b-r16
run_name: qlora-3b-r16
max_length: 512

# LoRA
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05

# Optimization
num_epochs: 3.0
per_device_batch_size: 4
gradient_accumulation_steps: 4   # effective batch size 16
learning_rate: 2.0e-4
warmup_ratio: 0.03
weight_decay: 0.0
lr_scheduler_type: cosine
max_grad_norm: 1.0

# Logging / eval
logging_steps: 10
eval_steps: 25
save_steps: 25
save_total_limit: 2
val_subset_size: 64

seed: 1337
